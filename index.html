<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar">
        <div class="user-profile">
            <div class="avatar">O</div>
            <span>Orlando</span>
        </div>
        <ul>
            <li onclick="switchTab('agenda')" id="tab-agenda" class="active"><i class="fa-solid fa-calendar-days"></i> Agenda Mensal</li>
            <li onclick="switchTab('fixo')" id="tab-fixo"><i class="fa-solid fa-graduation-cap"></i> Cronograma fixo</li>
            <li onclick="switchTab('tasks')" id="tab-tasks"><i class="fa-solid fa-list-check"></i> Checklist</li>
        </ul>
    </nav>

    <main class="content">
        <section id="section-agenda">
            <div class="dashboard-hoje">
                <div class="stat-card">
                    <span id="label-hoje">Eventos para hoje: 0</span>
                    <div class="progress-bar-container">
                        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <header class="main-header">
                <h2 id="current-month">Março 2026</h2>
                <div class="actions">
                    <button onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </header>
            <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <section id="section-fixo" style="display: none;">
            <header class="main-header">
                <h2>Cronograma Fixo - Engenharia</h2>
            </header>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="sticky-col">Tempo</th>
                            <th>Segunda</th>
                            <th>Terça</th>
                            <th>Quarta</th>
                            <th>Quinta</th>
                            <th>Sexta</th>
                            <th>Sábado</th>
                            <th>Domingo</th>
                        </tr>
                    </thead>
                    <tbody id="fixed-body"></tbody>
                </table>
            </div>
        </section>

        <section id="section-tasks" style="display: none;">
            <header class="main-header">
                <h2>Checklist de Tarefas</h2>
            </header>
            <div class="summary-container">
                <div class="summary-item">
                    <span class="summary-label">Concluídas</span>
                    <span id="tasks-done" class="summary-value">0</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Pendentes</span>
                    <span id="tasks-pending" class="summary-value">0</span>
                </div>
            </div>
            <div class="task-input-group">
                <input type="text" id="new-task-input" placeholder="Nova tarefa semanal...">
                <button onclick="addTask()"><i class="fa-solid fa-plus"></i></button>
            </div>
            <ul id="task-list" class="task-list"></ul>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Novo Compromisso</h3>
            <input type="text" id="event-title" placeholder="O que vamos fazer?">
            <select id="event-category">
                <option value="#38bdf8">Azul</option>
                <option value="#facc15">Amarelo</option>
                <option value="#f87171">Vermelho importante</option>
                <option value="#4ade80">Verde</option>
            </select>
            <div class="modal-buttons">
                <button onclick="saveEvent()" class="btn-save">Salvar</button>
                <button onclick="closeModal()" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
